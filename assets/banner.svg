<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f23;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e0e7ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c7d2fe;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="200" rx="12" fill="url(#bg)"/>
  <rect x="0" y="188" width="800" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
  <!-- Icon: stylized eye + hand -->
  <g transform="translate(180, 58)">
    <circle cx="24" cy="24" r="22" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.8"/>
    <circle cx="24" cy="24" r="8" fill="url(#accent)" opacity="0.9"/>
    <circle cx="24" cy="24" r="3" fill="#e0e7ff"/>
    <!-- signal waves -->
    <path d="M 54 12 Q 62 24 54 36" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.5"/>
    <path d="M 60 6 Q 72 24 60 42" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.3"/>
    <path d="M -6 12 Q -14 24 -6 36" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.5"/>
    <path d="M -12 6 Q -24 24 -12 42" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.3"/>
  </g>
  <!-- Title -->
  <text x="280" y="95" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="52" font-weight="700" fill="url(#textGrad)" letter-spacing="-1">driftx</text>
  <!-- Tagline -->
  <text x="283" y="128" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="16" fill="#94a3b8" letter-spacing="0.5">Eyes and hands for your AI coding agent</text>
  <!-- Platform pills -->
  <g transform="translate(280, 145)">
    <rect x="0" y="0" width="42" height="22" rx="11" fill="#6366f1" opacity="0.15"/>
    <text x="21" y="15" font-family="system-ui, sans-serif" font-size="11" fill="#a5b4fc" text-anchor="middle">iOS</text>
    <rect x="52" y="0" width="68" height="22" rx="11" fill="#6366f1" opacity="0.15"/>
    <text x="86" y="15" font-family="system-ui, sans-serif" font-size="11" fill="#a5b4fc" text-anchor="middle">Android</text>
    <rect x="130" y="0" width="98" height="22" rx="11" fill="#6366f1" opacity="0.15"/>
    <text x="179" y="15" font-family="system-ui, sans-serif" font-size="11" fill="#a5b4fc" text-anchor="middle">React Native</text>
  </g>
</svg>
