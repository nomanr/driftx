<svg xmlns="http://www.w3.org/2000/svg" width="800" height="220" viewBox="0 0 800 220">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1814"/>
      <stop offset="100%" stop-color="#1f1c17"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8a23e"/>
      <stop offset="100%" stop-color="#d4912e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8a23e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#e8a23e" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="220" rx="12" fill="url(#bg)"/>

  <!-- Subtle top glow -->
  <rect width="800" height="110" rx="12" fill="url(#glow)"/>

  <!-- Decorative side lines -->
  <line x1="60" y1="60" x2="60" y2="160" stroke="#e8a23e" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="740" y1="60" x2="740" y2="160" stroke="#e8a23e" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Eye icon -->
  <g transform="translate(376, 30)">
    <path d="M 0 24 Q 24 -2 48 24 Q 24 50 0 24 Z" fill="none" stroke="#e8a23e" stroke-width="2.5" stroke-linejoin="round"/>
    <circle cx="24" cy="24" r="10" fill="#e8a23e"/>
    <circle cx="21.5" cy="21.5" r="3.5" fill="#faf5ef"/>
  </g>

  <!-- Title -->
  <text x="400" y="128" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, sans-serif" font-size="58" font-weight="800" fill="#faf5ef" letter-spacing="-2.5">driftx</text>

  <!-- Tagline -->
  <text x="400" y="162" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, sans-serif" font-size="15" fill="#a39e93" letter-spacing="0.5">Eyes and hands for agentic mobile development</text>

  <!-- Bottom accent bar -->
  <rect x="350" y="184" width="100" height="2.5" rx="1.25" fill="url(#accent)" opacity="0.5"/>

  <!-- Subtle corner accents -->
  <path d="M 20 20 L 40 20" stroke="#e8a23e" stroke-opacity="0.12" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 20 20 L 20 40" stroke="#e8a23e" stroke-opacity="0.12" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 780 20 L 760 20" stroke="#e8a23e" stroke-opacity="0.12" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 780 20 L 780 40" stroke="#e8a23e" stroke-opacity="0.12" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 20 200 L 40 200" stroke="#e8a23e" stroke-opacity="0.12" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 20 200 L 20 180" stroke="#e8a23e" stroke-opacity="0.12" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 780 200 L 760 200" stroke="#e8a23e" stroke-opacity="0.12" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 780 200 L 780 180" stroke="#e8a23e" stroke-opacity="0.12" stroke-width="1.5" stroke-linecap="round"/>
</svg>
